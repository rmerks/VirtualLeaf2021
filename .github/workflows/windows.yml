name: VirtualLeaf compile clean and package for windows
run-name: ${{ github.actor }} is testing on windows 🚀

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2' # Specify the required Qt version
        host: 'windows'
        target: 'desktop'
        arch: 'win64_mingw81' 
        install-deps: true
        setup-python: true
        add-tools-to-path: true
        set-env: true
        aqtversion: ==3.1.*
        py7zrversion: ==0.20.*
        cache: false
	
    - name: Ensure MinGW is in PATH
      shell: pwsh
      run: |
        Write-Host "Qt5_Dir: $env:Qt5_Dir"
        # Qt5_Dir is like D:\a\VirtualLeaf2021\Qt\5.15.2\mingw81_64
        # We need to add D:\a\VirtualLeaf2021\Qt\Tools\mingw81_64\bin -> go up two levels then Tools
        $mingwBin = Join-Path -Path (Resolve-Path -Path "$env:Qt5_Dir\..\..") -ChildPath "Tools\mingw81_64\bin"
        Write-Host "Computed MinGW bin path: $mingwBin"
        if (Test-Path $mingwBin) {
          "$mingwBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        } else {
          Write-Host "WARNING: computed MinGW path does not exist: $mingwBin"
          Write-Host "Listing Qt root (one and two levels up):"
          Get-ChildItem -Force "$env:Qt5_Dir\.." | ForEach-Object { Write-Host $_.FullName }
          Get-ChildItem -Force "$env:Qt5_Dir\..\.." | ForEach-Object { Write-Host $_.FullName }
          # Add fallback known locations
          "D:\a\VirtualLeaf2021\Qt\Tools\mingw81_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\Qt\Tools\mingw81_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        }
        Write-Host "GITHUB_PATH contents:"
        Get-Content $env:GITHUB_PATH | ForEach-Object { Write-Host $_ }	
	
	
    - name: Configure Project with qmake
      run: |
        cd src
        qmake VirtualLeaf.pro

    - name: Build Project
      run: |
        cd src
        mingw32-make # Use 'mingw32-make' if you are using MinGW instead of MSVC

    - name: Package Project
      uses: actions/upload-artifact@v4
      with:
        name: VirtualLeaf-windows-x64
        path: |
          ${{ github.workspace }}/bin/**/*
          ${{ github.workspace }}/data/**/*

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Install
      run: sudo apt-get install zip gzip
    - name: Checkout code
      uses: actions/checkout@v3
      
    - uses: actions/download-artifact@v4
    - name: Display structure of downloaded files
      run: ls -R ${{ github.workspace }}
 
    - name: '📦 Package windows x64'
      if: github.event_name == 'release' && github.event.action == 'created'
      run: |
        zip -r VirtualLeaf-windows-x64.zip VirtualLeaf-windows-x64
        gh release upload ${{github.event.release.tag_name}} VirtualLeaf-windows-x64.zip        
      env:
        GITHUB_TOKEN: ${{ github.TOKEN }}
      shell: bash


