name: VirtualLeaf compile clean and package for windows
run-name: ${{ github.actor }} is testing on windows 🚀

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2' # Specify the required Qt version
        host: 'windows'
        target: 'desktop'
        arch: 'win64_mingw81' 
        install-deps: true
        setup-python: true
        add-tools-to-path: true
        set-env: true
        aqtversion: ==3.1.*
        py7zrversion: ==0.20.*
        cache: false

    - name: Install MinGW (MSYS2)
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-make

    - name: Add MinGW to PATH (robust)
      shell: pwsh
      run: |
        echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
        g++ --version
        mingw32-make --version

    - name: Configure Project with qmake
      run: |
        cd src
        qmake VirtualLeaf.pro -spec win32-g++

    - name: Build Project
      run: |
        cd src
        mingw32-make # Use 'mingw32-make' if you are using MinGW instead of MSVC

    - name: Package Project
      uses: actions/upload-artifact@v4
      with:
        name: VirtualLeaf-windows-x64
        path: |
          ${{ github.workspace }}/bin/**/*
          ${{ github.workspace }}/data/**/*

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Install
      run: sudo apt-get install zip gzip
    - name: Checkout code
      uses: actions/checkout@v3
      
    - uses: actions/download-artifact@v4
    - name: Display structure of downloaded files
      run: ls -R ${{ github.workspace }}
 
    - name: '📦 Package windows x64'
      if: github.event_name == 'release' && github.event.action == 'created'
      run: |
        zip -r VirtualLeaf-windows-x64.zip VirtualLeaf-windows-x64
        gh release upload ${{github.event.release.tag_name}} VirtualLeaf-windows-x64.zip        
      env:
        GITHUB_TOKEN: ${{ github.TOKEN }}
      shell: bash


